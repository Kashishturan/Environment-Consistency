name: Docker Image Checks (Frontend)

# Runs on push to main/develop/feature branches (when frontend or Dockerfile changes)
# Full pipeline: Lint → SonarQube → Build → Trivy → Dockle → Size → Push to ECR

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'frontend/**'
      - 'Dockerfile*'
      - 'nginx.conf'
      - '.github/workflows/docker-image-checks.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - 'Dockerfile*'
  workflow_dispatch:
    inputs:
      dockerfile_path:
        description: 'Path to Dockerfile'
        required: false
        default: 'Dockerfile'
      image_tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'

permissions:
  contents: read
  security-events: write
  pull-requests: write
  id-token: write   # Needed for OIDC (if using role-based ECR auth)

env:
  DOCKERFILE: ${{ github.event.inputs.dockerfile_path || 'Dockerfile' }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  AWS_REGION: us-east-1
  ECR_REPO_NAME: kong-frontend   # Change this to your ECR repository name

jobs:
  # -------------------------------------------------------------------------
  # 1. DOCKERFILE LINT (Hadolint)
  # -------------------------------------------------------------------------
  dockerfile-lint:
    name: '1. Lint Dockerfile'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.DOCKERFILE }}
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

  # -------------------------------------------------------------------------
  # 2. SONARQUBE / SONARCLOUD CODE QUALITY SCAN
  # Required secrets: SONAR_TOKEN, SONAR_HOST_URL (or use SonarCloud)
  # -------------------------------------------------------------------------
  sonarqube:
    name: '2. SonarQube Scan'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for SonarQube blame

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        continue-on-error: true   # Don't fail if secrets aren't set up yet
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          args: >
            -Dsonar.projectKey=kong-frontend
            -Dsonar.projectName="Kong Frontend"
            -Dsonar.sources=frontend
            -Dsonar.exclusions=**/node_modules/**

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        continue-on-error: true   # Warn but don't block
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

  # -------------------------------------------------------------------------
  # 3. BUILD DOCKER IMAGE
  # -------------------------------------------------------------------------
  build:
    name: '3. Build Docker Image'
    runs-on: ubuntu-latest
    needs: [dockerfile-lint, sonarqube]
    outputs:
      image_full: ${{ steps.set-names.outputs.image_full }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name and ECR URI
        id: set-names
        run: |
          REPO_LC=$(echo '${{ github.repository }}/frontend' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${REPO_LC}" >> $GITHUB_ENV
          echo "image_full=ghcr.io/${REPO_LC}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as tarball
        run: |
          docker save ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -o /tmp/frontend-image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image-${{ github.run_id }}
          path: /tmp/frontend-image.tar
          retention-days: 1

  # -------------------------------------------------------------------------
  # 4. TRIVY VULNERABILITY SCAN
  # -------------------------------------------------------------------------
  trivy-scan:
    name: '4. Trivy Vulnerability Scan'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: frontend-image-${{ github.run_id }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/frontend-image.tar

      - name: Run Trivy (SARIF for Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Print Trivy table summary
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH,MEDIUM

  # -------------------------------------------------------------------------
  # 5. DOCKLE CIS BENCHMARK
  # -------------------------------------------------------------------------
  dockle-scan:
    name: '5. Dockle CIS Benchmark'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: frontend-image-${{ github.run_id }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/frontend-image.tar

      - name: Run Dockle
        uses: goodwithtech/dockle-action@v1
        with:
          image: ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: json
          output: dockle-results.json
          exit-code: 0
          exit-level: fatal

      - name: Upload Dockle results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dockle-results-${{ github.run_id }}
          path: dockle-results.json
  # -------------------------------------------------------------------------
  # 6. IMAGE SIZE CHECK
  # -------------------------------------------------------------------------
  image-size-check:
    name: '6. Image Size Check'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: frontend-image-${{ github.run_id }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/frontend-image.tar

      - name: Check image size (warn if > 500MB)
        run: |
          SIZE=$(docker image inspect \
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 500 ]; then
            echo "::warning::Docker image size is ${SIZE_MB}MB (exceeds 500MB recommendation)"
          else
            echo "Image size ${SIZE_MB}MB is within the 500MB limit."
          fi

  # -------------------------------------------------------------------------
  # 7. PUSH TO AWS ECR  (only on main branch, after ALL checks pass)
  # Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID
  # -------------------------------------------------------------------------
  push-to-ecr:
    name: '7. Push to AWS ECR'
    runs-on: ubuntu-latest
    needs: [trivy-scan, dockle-scan, image-size-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}/frontend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR image URI
        run: |
          ECR_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_NAME }}"
          echo "ECR_URI=${ECR_URI}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.ECR_URI }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_URI }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print ECR image URI
        run: |
          echo "Image pushed successfully!"
          echo "ECR URI: ${{ env.ECR_URI }}:${{ env.IMAGE_TAG }}"
          echo "ECR URI: ${{ env.ECR_URI }}:latest"

  # -------------------------------------------------------------------------
  # POST PR SUMMARY COMMENT
  # -------------------------------------------------------------------------
  pr-summary:
    name: 'Post PR Summary'
    runs-on: ubuntu-latest
    needs: [trivy-scan, dockle-scan, image-size-check]
    if: github.event_name == 'pull_request'

    steps:
      - name: Post summary comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## 🐳 Docker Image Check Results

            | Step | Check | Status |
            |------|-------|--------|
            | 1 | Dockerfile Lint (Hadolint) | ✅ Passed |
            | 2 | SonarQube Code Quality | ✅ Passed |
            | 3 | Docker Build | ✅ Passed |
            | 4 | Vulnerability Scan (Trivy) | ✅ Passed |
            | 5 | CIS Benchmark (Dockle) | ✅ Passed |
            | 6 | Image Size Check | ✅ Passed |
            | 7 | Push to ECR | ⏭ Skipped on PR (runs on main merge) |

            > Full results in the **Security** tab and workflow artifacts.
            > Image tag: \`${{ env.IMAGE_TAG }}\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
