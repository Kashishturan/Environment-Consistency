name: Terraform CI/CD

# ============================================================
# MANUAL TRIGGER ONLY - never auto-runs on push/PR
# ============================================================
# How to run:
#   Actions → Terraform CI/CD → "Run workflow" button
#   Select environment: demo (no AWS needed), qa, prod, or central
#   Select action:      plan | apply | destroy
# ============================================================
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - demo     # ← No AWS needed - use this to test the pipeline
          - qa
          - prod
          - central
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

# Cancel any in-progress run for the same environment
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment }}
  cancel-in-progress: true

permissions:
  id-token: write   # Required for OIDC JWT
  contents: read    # Required for actions/checkout

env:
  TF_VERSION: "1.5.0"
  TFLINT_VERSION: "v0.50.0"

jobs:
  # -------------------------------------------------------------------------
  # LINT & SECURITY SCAN
  # -------------------------------------------------------------------------
  lint-and-scan:
    name: 'Lint & Security Scan'
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: TFLint Init
        run: tflint --init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Run TFLint
        run: tflint --format compact
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true  # Don't block on lint warnings

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail: true
          output_format: cli

  # -------------------------------------------------------------------------
  # TERRAFORM PLAN
  # -------------------------------------------------------------------------
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: lint-and-scan
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Only configure AWS when NOT using the demo environment
      - name: Configure AWS Credentials via OIDC
        if: github.event.inputs.environment != 'demo'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(github.event.inputs.environment))] }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Terraform-${{ github.event.inputs.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 3

  # -------------------------------------------------------------------------
  # TERRAFORM APPLY (prod always requires manual approval via GitHub Environments)
  # -------------------------------------------------------------------------
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event.inputs.action == 'apply'
    environment:
      name: ${{ github.event.inputs.environment }}
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        if: github.event.inputs.environment != 'demo'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(github.event.inputs.environment))] }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Apply-${{ github.event.inputs.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

  # -------------------------------------------------------------------------
  # TERRAFORM DESTROY (always requires manual approval via GitHub Environments)
  # -------------------------------------------------------------------------
  terraform-destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event.inputs.action == 'destroy'
    environment:
      name: ${{ github.event.inputs.environment }}
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        if: github.event.inputs.environment != 'demo'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(github.event.inputs.environment))] }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
