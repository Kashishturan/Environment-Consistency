name: Terraform CI/CD

# TESTING: push trigger added temporarily - remove 'push' block once pipeline is healthy.
# For production: keep only workflow_dispatch.

on:
  # TEMPORARY: auto-run demo plan on every push to main to verify pipeline
  push:
    branches:
      - main

  # PERMANENT: manual trigger for real deployments
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (use demo to test without AWS)'
        required: true
        type: choice
        options:
          - demo
          - qa
          - prod
          - central
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

# Cancel duplicate runs for the same environment
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment || 'demo' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.5.0"
  TFLINT_VERSION: "v0.50.0"
  # Fallback to 'demo'/'plan' when triggered by push (inputs are empty)
  TF_ENV: ${{ github.event.inputs.environment || 'demo' }}
  TF_ACTION: ${{ github.event.inputs.action || 'plan' }}

jobs:
  # -------------------------------------------------------------------------
  # LINT & SECURITY SCAN
  # -------------------------------------------------------------------------
  lint-and-scan:
    name: 'Lint & Security Scan'
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment || 'demo' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: TFLint Init
        run: tflint --init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Run TFLint
        run: tflint --format compact
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail: true
          output_format: cli

  # -------------------------------------------------------------------------
  # TERRAFORM PLAN
  # -------------------------------------------------------------------------
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: lint-and-scan
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment || 'demo' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Skip AWS auth for 'demo' environment (local backend, no AWS needed)
      - name: Configure AWS Credentials via OIDC
        if: ${{ (github.event.inputs.environment || 'demo') != 'demo' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(github.event.inputs.environment))] }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Terraform-${{ github.event.inputs.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'demo' }}-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 3

  # -------------------------------------------------------------------------
  # TERRAFORM APPLY
  # Only runs when action == 'apply' (never on push trigger)
  # Prod environment requires manual approval via GitHub Environments settings
  # -------------------------------------------------------------------------
  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ (github.event.inputs.action || 'plan') == 'apply' }}
    environment:
      name: ${{ github.event.inputs.environment || 'demo' }}
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment || 'demo' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        if: ${{ (github.event.inputs.environment || 'demo') != 'demo' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(github.event.inputs.environment))] }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Apply-${{ github.event.inputs.environment }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment || 'demo' }}-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

  # -------------------------------------------------------------------------
  # TERRAFORM DESTROY
  # Only runs when action == 'destroy' (never on push trigger)
  # Always requires manual approval via GitHub Environments
  # -------------------------------------------------------------------------
  terraform-destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ (github.event.inputs.action || 'plan') == 'destroy' }}
    environment:
      name: ${{ github.event.inputs.environment || 'demo' }}
    env:
      TF_WORKING_DIR: terraform/environments/${{ github.event.inputs.environment || 'demo' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        if: ${{ (github.event.inputs.environment || 'demo') != 'demo' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(github.event.inputs.environment))] }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
